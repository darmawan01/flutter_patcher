group = "com.flutter_patcher.flutter_patcher"
version = "1.0-SNAPSHOT"

buildscript {
    ext.kotlin_version = "2.2.20"
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.11.1")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
    // Kotlin incremental cache path relativization can fail on Windows when a
    // Flutter plugin is compiled from Pub Cache on C: into an app on another
    // drive. Keep this library compile non-incremental; app modules are
    // unaffected.
    incremental = false
}

android {
    namespace = "com.flutter_patcher.flutter_patcher"

    compileSdk = 36
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        test.java.srcDirs += "src/test/kotlin"
    }

    defaultConfig {
        minSdk = 24

        // ABI 白名单：覆盖主流 Android 设备。Flutter 默认只出 arm64-v8a，
        // 但插件要兼容 32 位旧机型和 x86_64 模拟器。
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
        }

        // 让 AGP 把本插件的 consumer R8 规则合并到宿主 release build
        consumerProguardFiles 'consumer-rules.pro'
    }

    dependencies {
        // Self-contained Ed25519 verification (lightweight crypto API) so signature
        // checks don't depend on platform JCA provider availability, which is missing
        // on API 33 and routes to the wrong (AndroidKeyStore) provider on API 35.
        implementation("org.bouncycastle:bcprov-jdk18on:1.78.1")
        testImplementation("org.jetbrains.kotlin:kotlin-test")
        testImplementation("org.json:json:20240303")
        testImplementation("org.mockito:mockito-core:5.0.0")
    }

    testOptions {
        unitTests.all {
            useJUnitPlatform()
            jvmArgs "-Dnet.bytebuddy.experimental=true"

            testLogging {
               events "passed", "skipped", "failed", "standardOut", "standardError"
               outputs.upToDateWhen {false}
               showStandardStreams = true
            }
        }
    }
}
